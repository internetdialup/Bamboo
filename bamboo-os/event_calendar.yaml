# Bamboo Event Calendar (Agnostic Catalysts)
# Define your project-specific events here.

events:
  - id: "daily_backup"
    name: "Daily Repository Backup"
    trigger: "02:00:00"
    posture: "DANIEL"

  - id: "security_sweep"
    name: "Automated Secret/Key Sweep"
    trigger: "interval:1h"
    posture: "SAMANTHA"

  - id: "email_digest"
    name: "Morning Alpha/Status Digest"
    trigger: "08:00:00"
    posture: "DANIEL"

  - id: "memory_gc"
    name: "Context Compression/Garbage Collection"
    trigger: "threshold:saturation"
    posture: "SAMANTHA"
